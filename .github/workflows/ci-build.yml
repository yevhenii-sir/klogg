name: "CI Build"

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'website/**'
      - BUILD.md
      - CODE_OF_CONDUCT.md
      - CONTRIBUTING.md
      - README.md
      - latest.json
      - .gitignore
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'website/**'
      - BUILD.md
      - CODE_OF_CONDUCT.md
      - CONTRIBUTING.md
      - README.md
      - latest.json
      - .gitignore
  workflow_dispatch:

jobs:
  SaveVersion:
    needs: [PrefetchDeps]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-22.04
    outputs:
      klogg_version: ${{ steps.save-version.outputs.klogg_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/klogg-version

      - name: Save version
        id: save-version
        shell: sh
        run: |
          echo "klogg_version=$KLOGG_VERSION" >> "$GITHUB_OUTPUT"
          echo "$KLOGG_VERSION" > klogg_version.txt

      - uses: actions/upload-artifact@v4
        with:
          name: klogg_version
          path: 'klogg_version.txt'
          if-no-files-found: error

  PrefetchDeps:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: "Prefetch shared CPM cache"
    runs-on: ubuntu-22.04
    env:
      KLOGG_WORKSPACE: ${{ github.workspace }}
      BOOST_URL: https://sourceforge.net/projects/boost/files/boost/1.86.0/boost_1_86_0.tar.bz2/download
      OPENSSL_URL: https://www.firedaemon.com/download-firedaemon-openssl-1.1.1-zip
      CMAKE_INSTALLER_URL: https://github.com/Kitware/CMake/releases/download/v3.20.2/cmake-3.20.2-linux-x86_64.sh
    steps:
      - uses: actions/checkout@v4

      - name: Restore shared CPM cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/cpm_cache
          key: CPM-${{ hashFiles('3rdparty/CMakeLists.txt', 'cmake/CPM.cmake', '3rdparty/patches/**', 'cmake/prefetch_cpm/CMakeLists.txt') }}

      - name: Restore Boost prefetch cache
        id: cache-boost-prefetch
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/prefetch_artifacts/boost
          key: boost-prefetch-1-86-0

      - name: Restore OpenSSL prefetch cache
        id: cache-openssl-prefetch
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/prefetch_artifacts/openssl.zip
          key: openssl-prefetch-1-1-1w

      - uses: ./.github/actions/prefetch-cpm-cache

      - name: Prefetch Boost artifact
        if: ${{ steps.cache-boost-prefetch.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          PREFETCH_ROOT="$KLOGG_WORKSPACE/prefetch_artifacts"
          BOOST_ROOT="$PREFETCH_ROOT/boost"
          BOOST_ARCHIVE="$PREFETCH_ROOT/boost.tar.bz2"

          mkdir -p "$BOOST_ROOT"

          attempt=1
          max_attempts=3
          while [ $attempt -le $max_attempts ]; do
            rm -rf "$BOOST_ROOT"
            mkdir -p "$BOOST_ROOT"

            if curl --progress-bar --location --output "$BOOST_ARCHIVE" "$BOOST_URL"; then
              tar -xjf "$BOOST_ARCHIVE" -C "$PREFETCH_ROOT"
              cp -r "$PREFETCH_ROOT"/boost_*/* "$BOOST_ROOT"/
              rm -rf "$PREFETCH_ROOT"/boost_* "$BOOST_ARCHIVE"
              exit 0
            fi

            rm -f "$BOOST_ARCHIVE"

            if [ $attempt -eq $max_attempts ]; then
              exit 1
            fi

            echo "Boost prefetch attempt $attempt failed, retrying after backoff..."
            attempt=$((attempt + 1))
            sleep $((attempt * 10))
          done

      - name: Prefetch OpenSSL artifact
        if: ${{ steps.cache-openssl-prefetch.outputs.cache-hit != 'true' }}
        shell: sh
        run: |
          PREFETCH_ROOT="$KLOGG_WORKSPACE/prefetch_artifacts"
          OPENSSL_ARCHIVE="$PREFETCH_ROOT/openssl.zip"

          mkdir -p "$PREFETCH_ROOT"

          attempt=1
          max_attempts=3
          while [ $attempt -le $max_attempts ]; do
            if curl --progress-bar --location --output "$OPENSSL_ARCHIVE" "$OPENSSL_URL"; then
              exit 0
            fi

            rm -f "$OPENSSL_ARCHIVE"

            if [ $attempt -eq $max_attempts ]; then
              exit 1
            fi

            echo "OpenSSL prefetch attempt $attempt failed, retrying after backoff..."
            attempt=$((attempt + 1))
            sleep $((attempt * 10))
          done

      - name: Prefetch linuxdeployqt artifact
        shell: sh
        run: |
          PREFETCH_ROOT="$KLOGG_WORKSPACE/prefetch_artifacts"
          LINUXDEPLOYQT="$PREFETCH_ROOT/linuxdeployqt-continuous-x86_64.AppImage"
          LINUXDEPLOYQT_URL="https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"

          mkdir -p "$PREFETCH_ROOT"

          attempt=1
          max_attempts=3
          while [ $attempt -le $max_attempts ]; do
            rm -f "$LINUXDEPLOYQT"

            if curl --fail --retry 3 --retry-delay 10 --progress-bar --location \
              --output "$LINUXDEPLOYQT" "$LINUXDEPLOYQT_URL"; then
              if file "$LINUXDEPLOYQT" | grep -q "ELF"; then
                chmod +x "$LINUXDEPLOYQT"
                exit 0
              fi
              echo "Downloaded file is not a valid ELF/AppImage binary, retrying..."
              rm -f "$LINUXDEPLOYQT"
            fi

            if [ $attempt -eq $max_attempts ]; then
              echo "::error::Failed to download linuxdeployqt after $max_attempts attempts"
              exit 1
            fi

            echo "linuxdeployqt prefetch attempt $attempt failed, retrying after backoff..."
            attempt=$((attempt + 1))
            sleep $((attempt * 10))
          done

      - name: Prefetch CMake installer
        shell: sh
        run: |
          PREFETCH_ROOT="$KLOGG_WORKSPACE/prefetch_artifacts"
          CMAKE_INSTALLER="$PREFETCH_ROOT/cmake-3.20.2-linux-x86_64.sh"

          mkdir -p "$PREFETCH_ROOT"

          attempt=1
          max_attempts=3
          while [ $attempt -le $max_attempts ]; do
            rm -f "$CMAKE_INSTALLER"

            if curl --fail --retry 3 --retry-delay 10 --progress-bar --location \
              --output "$CMAKE_INSTALLER" "$CMAKE_INSTALLER_URL"; then
              if head -1 "$CMAKE_INSTALLER" | grep -q '#!/'; then
                chmod +x "$CMAKE_INSTALLER"
                exit 0
              fi
              echo "Downloaded file is not a valid shell script, retrying..."
              rm -f "$CMAKE_INSTALLER"
            fi

            if [ $attempt -eq $max_attempts ]; then
              echo "::error::Failed to download CMake installer after $max_attempts attempts"
              exit 1
            fi

            echo "CMake installer prefetch attempt $attempt failed, retrying after backoff..."
            attempt=$((attempt + 1))
            sleep $((attempt * 10))
          done

      - uses: actions/upload-artifact@v4
        with:
          name: cpm-cache
          path: cpm_cache
          if-no-files-found: error
          include-hidden-files: true

      - uses: actions/upload-artifact@v4
        with:
          name: boost-root
          path: prefetch_artifacts/boost
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: openssl-archive
          path: prefetch_artifacts/openssl.zip
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: linuxdeployqt
          path: prefetch_artifacts/linuxdeployqt-continuous-x86_64.AppImage
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: cmake-installer
          path: prefetch_artifacts/cmake-3.20.2-linux-x86_64.sh
          if-no-files-found: error

  PrefetchWindowsTools:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: "Prefetch Windows MSYS2 tools"
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Restore MSYS2 tools cache
        id: cache-msys2-tools
        uses: actions/cache@v4
        with:
          path: prefetch_artifacts/msys2-tools.zip
          key: msys2-tools-mingw64-ragel-pkgconf-v1

      - name: Setup MSYS2 and install tools (attempt 1)
        if: ${{ steps.cache-msys2-tools.outputs.cache-hit != 'true' }}
        id: msys2-attempt-1
        continue-on-error: true
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-ragel
            mingw-w64-x86_64-pkgconf

      - name: Clean failed MSYS2 setup
        if: ${{ steps.cache-msys2-tools.outputs.cache-hit != 'true' && steps.msys2-attempt-1.outcome == 'failure' }}
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue `
            (Join-Path $env:RUNNER_TEMP "setup-msys2"), `
            (Join-Path $env:RUNNER_TEMP "msys64")

      - name: Setup MSYS2 and install tools (attempt 2)
        id: msys2-attempt-2
        if: ${{ steps.cache-msys2-tools.outputs.cache-hit != 'true' && steps.msys2-attempt-1.outcome == 'failure' }}
        continue-on-error: true
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-ragel
            mingw-w64-x86_64-pkgconf

      - name: Clean failed MSYS2 setup
        if: ${{ steps.cache-msys2-tools.outputs.cache-hit != 'true' && steps.msys2-attempt-1.outcome == 'failure' && steps.msys2-attempt-2.outcome == 'failure' }}
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue `
            (Join-Path $env:RUNNER_TEMP "setup-msys2"), `
            (Join-Path $env:RUNNER_TEMP "msys64")

      - name: Setup MSYS2 and install tools (attempt 3)
        id: msys2-attempt-3
        if: ${{ steps.cache-msys2-tools.outputs.cache-hit != 'true' && steps.msys2-attempt-1.outcome == 'failure' && steps.msys2-attempt-2.outcome == 'failure' }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-ragel
            mingw-w64-x86_64-pkgconf

      - name: Package MSYS2 tools
        if: ${{ steps.cache-msys2-tools.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          $msysBinCandidates = @(
            (Join-Path $env:RUNNER_TEMP "setup-msys2\mingw64\bin"),
            (Join-Path $env:RUNNER_TEMP "setup-msys2\msys64\mingw64\bin"),
            (Join-Path $env:RUNNER_TEMP "msys64\mingw64\bin"),
            "C:\msys64\mingw64\bin"
          )

          $msysBin = $msysBinCandidates |
            Where-Object {
              (Test-Path (Join-Path $_ "ragel.exe")) -and
              (Test-Path (Join-Path $_ "pkg-config.exe"))
            } |
            Select-Object -First 1
          if ( !$msysBin ) {
            Write-Error "ragel/pkg-config binaries not found in MSYS2 mingw64 bin candidates: $($msysBinCandidates -join ', ')"
            exit 1
          }

          $msysRoot = Split-Path (Split-Path $msysBin -Parent) -Parent
          $artifactRoot = Join-Path $env:GITHUB_WORKSPACE "prefetch_artifacts\msys2-tools"
          $artifactZip = Join-Path $env:GITHUB_WORKSPACE "prefetch_artifacts\msys2-tools.zip"
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null
          Copy-Item -Path $msysRoot -Destination (Join-Path $artifactRoot "msys64") -Recurse -Force

          Push-Location $artifactRoot
          Compress-Archive -Path "msys64" -DestinationPath $artifactZip -Force
          Pop-Location

      - name: Verify MSYS2 tools archive
        shell: pwsh
        run: |
          $artifactZip = Join-Path $env:GITHUB_WORKSPACE "prefetch_artifacts\msys2-tools.zip"
          if ( !(Test-Path $artifactZip) ) {
            Write-Error "MSYS2 tools archive missing at $artifactZip"
            exit 1
          }

          $verifyRoot = Join-Path $env:RUNNER_TEMP "verify-msys2-tools"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $verifyRoot
          New-Item -ItemType Directory -Force -Path $verifyRoot | Out-Null
          Expand-Archive -Path $artifactZip -DestinationPath $verifyRoot -Force

          $msysBin = Join-Path $verifyRoot "msys64\mingw64\bin"
          if ( !(Test-Path (Join-Path $msysBin "ragel.exe")) -or
               !(Test-Path (Join-Path $msysBin "pkg-config.exe")) ) {
            Write-Error "MSYS2 archive does not contain ragel.exe and pkg-config.exe under msys64\mingw64\bin"
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: msys2-tools
          path: prefetch_artifacts/msys2-tools.zip
          if-no-files-found: error

  Linux:
    needs: [SaveVersion]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: "Linux ${{ matrix.config.label }} [${{ matrix.config.package_tag }}]"
    env:
      KLOGG_VERSION: ${{ needs.SaveVersion.outputs.klogg_version }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu_jammy
            os_version: 22.04
            arch: x64
            label: ubuntu-22.04-deb
            package_tag: vs-gen
            cpack_gen: DEB
            artifacts_id: jammy
            package_suffix: deb
            check_container: ubuntu:22.04
            container_root: docker/ubuntu22.04
            container: variar/klogg_ubuntu22.04
            cmake_opts: -DKLOGG_GENERIC_CPU=ON
            check_command: apt-get update && DEBIAN_FRONTEND=noninteractive apt install -y /usr/local/klogg*.deb && QT_QPA_PLATFORM=offscreen klogg -v

          - os: ubuntu_noble
            os_version: 24.04
            arch: x64
            label: ubuntu-24.04-deb
            package_tag: vs-gen
            check_command: apt-get update && DEBIAN_FRONTEND=noninteractive apt install -y /usr/local/klogg*.deb && QT_QPA_PLATFORM=offscreen klogg -v
            cpack_gen: DEB
            artifacts_id: noble
            package_suffix: deb
            check_container: ubuntu:24.04
            container_root: docker/ubuntu24.04
            container: variar/klogg_ubuntu24.04
            cmake_opts: -DENABLE_CPPCHECK=ON -DKLOGG_GENERIC_CPU=ON

          - os: ubuntu_appimage
            os_version: 20.04
            arch: x64
            label: ubuntu-20.04-appimage
            package_tag: vs-gen
            artifacts_id: appimage
            package_suffix: AppImage
            container_root: docker/ubuntu20.04
            container: variar/klogg_ubuntu20.04
            cmake_opts: -DKLOGG_GENERIC_CPU=ON


    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: cpm-cache
          path: ${{ github.workspace }}/cpm_cache

      - uses: actions/download-artifact@v4
        with:
          name: linuxdeployqt
          path: ${{ github.workspace }}/tools

      - uses: actions/download-artifact@v4
        with:
          name: cmake-installer
          path: ${{ github.workspace }}/tools

      - name: Copy CMake installer to Docker context
        shell: sh
        run: |
          cp "${{ github.workspace }}/tools/cmake-3.20.2-linux-x86_64.sh" "${{ matrix.config.container_root }}/"

      #- uses: satackey/action-docker-layer-caching@v0.0.11
      #  # Ignore the failure of a step and avoid terminating the job.
      #  continue-on-error: true

      - name: Build container
        run: |
          cd ${{ matrix.config.container_root }}
          docker build -t ${{ matrix.config.container }} .

      - uses: ./.github/actions/prepare-workspace-env
      - name: Lock CPM downloads to prefetched cache
        shell: sh
        run: |
          echo "KLOGG_CMAKE_OPTS=$KLOGG_CMAKE_OPTS -DFETCHCONTENT_FULLY_DISCONNECTED=ON" >> $GITHUB_ENV
      - uses: ./.github/actions/docker-build
      - uses: ./.github/actions/docker-run-tests
      - uses: ./.github/actions/docker-package
          
# Final upload of all packages
      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.config.artifacts_id }}-${{ matrix.config.package_tag }}
          path: '${{ env.KLOGG_BUILD_ROOT }}/packages/*'
          if-no-files-found: error      

  Mac:
    needs: [SaveVersion]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: "macOS ${{ matrix.config.label }} [${{ matrix.config.package_tag }}]"
    env:
      KLOGG_VERSION: ${{ needs.SaveVersion.outputs.klogg_version }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: macos-15-intel
            qt_version: 6.9.3
            qt_modules: qt5compat qtimageformats
            qt_archives: qtbase icu qtsvg qttools qttranslations
            qt_arch: clang_64
            arch: x64
            label: intel-qt6
            package_tag: vs-gen
            artifacts_id: macos-intel-qt6
            cmake_opts: -DKLOGG_OSX_DEPLOYMENT_TARGET=15.0
          - os: macos-latest
            qt_version: 6.9.3
            qt_modules: qt5compat qtimageformats
            qt_archives: qtbase icu qtsvg qttools qttranslations
            qt_arch: clang_64
            arch: arm64
            label: arm64-qt6
            package_tag: vs-arm64
            artifacts_id: macos-arm-qt6
            cmake_opts: -DKLOGG_OSX_DEPLOYMENT_TARGET=14.0

    runs-on: ${{ matrix.config.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: List available Xcode versions
        shell: sh
        run: ls /Applications | grep Xcode
      
      - name: Setup Xcode
        shell: sh
        run: sudo xcode-select -s /Applications/Xcode.app

#Install build deps
      - name: Set brew env
        shell: sh
        run: |
          echo "HOMEBREW_NO_ANALYTICS=1" >> $GITHUB_ENV
          echo "HOMEBREW_NO_AUTO_UPDATE=1" >> $GITHUB_ENV
          echo "HOMEBREW_NO_INSTALL_CLEANUP=1" >> $GITHUB_ENV

      - name: Brew deps
        run: |
          brew install ragel

      - uses: actions/download-artifact@v4
        with:
          name: boost-root
          path: ${{ github.workspace }}/3rdparty/boost

      - name: Require prefetched dependency artifacts
        shell: sh
        run: |
          echo "KLOGG_REQUIRE_PREFETCHED_BOOST=ON" >> $GITHUB_ENV
          echo "KLOGG_REQUIRE_PREFETCHED_CPM=ON" >> $GITHUB_ENV

      - uses: ./.github/actions/agent-setup
      - uses: actions/download-artifact@v4
        with:
          name: cpm-cache
          path: ${{ github.workspace }}/cpm_cache
      - uses: ./.github/actions/prepare-workspace-env

      - name: Disable Sentry on macOS
        shell: sh
        run: |
          # Disable Sentry on macOS due to Crashpad incompatibility with newer Xcode SDKs
          # macOS 15+ requires at least 2018 Macs (Kaby Lake / Apple Silicon),
          # all of which support AVX2 / NEON.  Use GENERIC_CPU=OFF to enable
          # hardware-specific optimizations (AVX2 for Intel, NEON for ARM64).
          echo "KLOGG_CMAKE_OPTS=-G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DKLOGG_GENERIC_CPU=OFF -DKLOGG_USE_SENTRY=OFF -DCMAKE_INSTALL_PREFIX=/usr -DFETCHCONTENT_FULLY_DISCONNECTED=ON ${{ matrix.config.cmake_opts }}" >> $GITHUB_ENV
      
      - uses: ./.github/actions/agent-build
      - uses: ./.github/actions/agent-run-tests
      - uses: ./.github/actions/agent-package-mac
        with:
          p12-file-base64: ${{ secrets.CODESIGN_BASE64 }}
          p12-password: ${{ secrets.CODESIGN_PASSWORD }}
          notarization-username: ${{ secrets.NOTARIZATION_USERNAME }}
          notarization-team: ${{ secrets.NOTARIZATION_TEAM }}
          notarization-password: ${{ secrets.NOTARIZATION_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.config.artifacts_id }}-${{ matrix.config.package_tag }}
          path: '${{ env.KLOGG_BUILD_ROOT }}/packages/*' 
          if-no-files-found: warn

  Windows:
    needs: [SaveVersion, PrefetchWindowsTools]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: "Windows ${{ matrix.config.label }} [${{ matrix.config.package_tag }}]"
    env:
      KLOGG_VERSION: ${{ needs.SaveVersion.outputs.klogg_version }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: windows
            os_version: 2022
            qt_version: 6.9.3
            qt_modules: qt5compat qtimageformats
            qt_archives: qtbase icu qtsvg qttools qttranslations
            qt_arch: win64_msvc2022_64
            arch: x64
            ssl_arch: -x64
            package_tag: vs-avx2
            cmake_opts: -DKLOGG_GENERIC_CPU=OFF -DKLOGG_USE_VECTORSCAN=ON
            label: x64-qt6
            artifacts_id: windows-x64-qt6

          - os: windows
            os_version: 2022
            qt_version: 5.15.2
            qt_modules: 
            qt_archives: qtbase qtimageformats qttools qttranslations icu qtsvg
            qt_arch: win32_msvc2019
            arch: x86
            package_tag: QTRegex
            cmake_opts: -DKLOGG_USE_SENTRY=OFF -DKLOGG_GENERIC_CPU=ON -DKLOGG_USE_VECTORSCAN=OFF
            label: x86-qt5
            artifacts_id: windows-x86-qt5

    runs-on: ${{ matrix.config.os }}-${{ matrix.config.os_version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: openssl-archive
          path: ${{ github.workspace }}

      - name: Unpack prefetched openssl
        run: |
          if ( !(Test-Path openssl.zip) ) {
            Write-Error "Prefetched OpenSSL artifact is required but openssl.zip is missing"
            exit 1
          }
          7z x openssl.zip 

      - uses: actions/download-artifact@v4
        with:
          name: msys2-tools
          path: ${{ github.workspace }}

      - name: Unpack prefetched MSYS2 tools
        shell: pwsh
        run: |
          $archive = Join-Path $env:GITHUB_WORKSPACE "msys2-tools.zip"
          if ( !(Test-Path $archive) ) {
            Write-Error "Prefetched MSYS2 tools artifact is required but msys2-tools.zip is missing"
            exit 1
          }

          $toolsRoot = Join-Path $env:GITHUB_WORKSPACE "msys2-tools"
          New-Item -ItemType Directory -Force -Path $toolsRoot | Out-Null
          Expand-Archive -Path $archive -DestinationPath $toolsRoot -Force

      - name: Set openssl paths
        shell: sh
        run: |
          echo "SSL_DIR=${{ github.workspace }}\openssl-1.1\${{ matrix.config.arch }}\bin" >> $GITHUB_ENV
          echo "SSL_ARCH=${{ matrix.config.ssl_arch }}" >> $GITHUB_ENV 

      - uses: actions/download-artifact@v4
        with:
          name: boost-root
          path: ${{ github.workspace }}/3rdparty/boost

      - name: Require prefetched dependency artifacts
        shell: sh
        run: |
          echo "KLOGG_REQUIRE_PREFETCHED_BOOST=ON" >> $GITHUB_ENV
          echo "KLOGG_REQUIRE_PREFETCHED_CPM=ON" >> $GITHUB_ENV

      - uses: ./.github/actions/agent-setup
      - uses: actions/download-artifact@v4
        with:
          name: cpm-cache
          path: ${{ github.workspace }}/cpm_cache
      - uses: ./.github/actions/prepare-workspace-env

      - name: Lock CPM downloads to prefetched cache
        shell: sh
        run: |
          echo "KLOGG_CMAKE_OPTS=$KLOGG_CMAKE_OPTS -DFETCHCONTENT_FULLY_DISCONNECTED=ON" >> $GITHUB_ENV

      - name: Prepare dev cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.config.arch }}

      - name: Add MSYS2 toolchain to PATH
        shell: pwsh
        run: |
          $msysBinCandidates = @(
            (Join-Path $env:GITHUB_WORKSPACE "msys2-tools\msys64\mingw64\bin"),
            (Join-Path $env:RUNNER_TEMP "setup-msys2\mingw64\bin"),
            (Join-Path $env:RUNNER_TEMP "setup-msys2\msys64\mingw64\bin"),
            (Join-Path $env:RUNNER_TEMP "msys64\mingw64\bin"),
            "C:\msys64\mingw64\bin"
          )

          $msysBin = $msysBinCandidates |
            Where-Object {
              (Test-Path (Join-Path $_ "ragel.exe")) -and
              (Test-Path (Join-Path $_ "pkg-config.exe"))
            } |
            Select-Object -First 1
          if ( !$msysBin ) {
            Write-Error "ragel/pkg-config binaries not found in MSYS2 mingw64 bin candidates: $($msysBinCandidates -join ', ')"
            exit 1
          }

          $ragelPath = Join-Path $msysBin "ragel.exe"
          Write-Host "Using ragel from $ragelPath"
          $msysBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Ragel
        shell: pwsh
        run: |
          ragel -v

      - name: Verify pkg-config
        shell: pwsh
        run: |
          pkg-config --version

      - uses: ./.github/actions/agent-build

      - name: Verify vectorscan config in CMake cache (x64)
        if: ${{ matrix.config.arch == 'x64' }}
        shell: pwsh
        run: |
          $cachePath = Join-Path $env:GITHUB_WORKSPACE "build_root\CMakeCache.txt"
          if ( !(Test-Path $cachePath) ) {
            Write-Error "CMake cache not found at $cachePath"
            exit 1
          }

          $vectorscan = Select-String -Path $cachePath -Pattern '^KLOGG_USE_VECTORSCAN:BOOL=ON$'
          if ( !$vectorscan ) {
            Write-Host "Current regex backend values:"
            Select-String -Path $cachePath -Pattern '^KLOGG_USE_VECTORSCAN:BOOL=|^KLOGG_GENERIC_CPU:BOOL=' | ForEach-Object { $_.Line }
            Write-Error "Unexpected vectorscan CMake settings"
            exit 1
          }

      - name: Verify vectorscan disabled in CMake cache (x86)
        if: ${{ matrix.config.arch == 'x86' }}
        shell: pwsh
        run: |
          $cachePath = Join-Path $env:GITHUB_WORKSPACE "build_root\CMakeCache.txt"
          if ( !(Test-Path $cachePath) ) {
            Write-Error "CMake cache not found at $cachePath"
            exit 1
          }

          $vectorscan = Select-String -Path $cachePath -Pattern '^KLOGG_USE_VECTORSCAN:BOOL=OFF$'
          if ( !$vectorscan ) {
            Write-Host "Current regex backend values:"
            Select-String -Path $cachePath -Pattern '^KLOGG_USE_VECTORSCAN:BOOL=|^KLOGG_GENERIC_CPU:BOOL=' | ForEach-Object { $_.Line }
            Write-Error "Vectorscan must stay disabled on Windows x86"
            exit 1
          }

      - name: Configure crash dumps for x86 integration tests
        if: ${{ matrix.config.arch == 'x86' }}
        shell: pwsh
        run: |
          $dumpDir = Join-Path $env:GITHUB_WORKSPACE "build_root\crash_dumps"
          New-Item -ItemType Directory -Force -Path $dumpDir | Out-Null

          $regPath = "HKCU\Software\Microsoft\Windows\Windows Error Reporting\LocalDumps\klogg_itests.exe"
          reg add "$regPath" /v DumpFolder /t REG_EXPAND_SZ /d "$dumpDir" /f
          reg add "$regPath" /v DumpCount /t REG_DWORD /d 10 /f
          reg add "$regPath" /v DumpType /t REG_DWORD /d 2 /f

      - uses: ./.github/actions/agent-run-tests
        id: run-tests
        continue-on-error: true

      - name: Collect x86 diagnostics on test failure
        if: ${{ matrix.config.arch == 'x86' && steps.run-tests.outcome == 'failure' }}
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $diagRoot = Join-Path $workspace "build_root\diagnostics"
          New-Item -ItemType Directory -Force -Path $diagRoot | Out-Null

          $ctestTemp = Join-Path $workspace "build_root\Testing\Temporary"
          if ( Test-Path $ctestTemp ) {
            Copy-Item $ctestTemp -Destination (Join-Path $diagRoot "Testing-Temporary") -Recurse -Force
          }

          $dumpDir = Join-Path $workspace "build_root\crash_dumps"
          if ( Test-Path $dumpDir ) {
            Copy-Item $dumpDir -Destination (Join-Path $diagRoot "crash_dumps") -Recurse -Force
          }

          $itestsPdb = Join-Path $workspace "build_root\output\klogg_itests.pdb"
          if ( Test-Path $itestsPdb ) {
            Copy-Item $itestsPdb -Destination $diagRoot -Force
          }

          $timeRange = (Get-Date).AddHours(-2)
          Get-WinEvent -FilterHashtable @{ LogName = 'Application'; StartTime = $timeRange } -MaxEvents 300 |
            Select-Object TimeCreated, Id, LevelDisplayName, ProviderName, Message |
            Format-List | Out-File -FilePath (Join-Path $diagRoot "eventlog_application.txt") -Width 300
          Get-WinEvent -FilterHashtable @{ LogName = 'System'; StartTime = $timeRange } -MaxEvents 300 |
            Select-Object TimeCreated, Id, LevelDisplayName, ProviderName, Message |
            Format-List | Out-File -FilePath (Join-Path $diagRoot "eventlog_system.txt") -Width 300

      - name: Upload x86 diagnostics artifact
        if: ${{ matrix.config.arch == 'x86' && steps.run-tests.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86-test-diagnostics
          path: '${{ github.workspace }}\build_root\diagnostics\**\*'
          if-no-files-found: warn

      - name: Fail when tests fail
        if: ${{ steps.run-tests.outcome == 'failure' }}
        shell: sh
        run: exit 1

      - uses: ./.github/actions/agent-package-win
        if: ${{ steps.run-tests.outcome == 'success' }}
        with:
          s3-key-id: ${{ secrets.WIN_CS_KEY_ID }}
          s3-secret: ${{ secrets.WIN_CS_SECRET }}
          s3-bucket: ${{ secrets.WIN_CS_BUCKET }}
     
# Final upload of all packages
      - uses: actions/upload-artifact@v4
        if: ${{ steps.run-tests.outcome == 'success' }}
        with:
          name: packages-${{ matrix.config.artifacts_id }}-${{ matrix.config.package_tag }}
          path: '${{ env.KLOGG_BUILD_ROOT }}/packages/*'
          if-no-files-found: error

  ci-gate:
    if: always()
    needs: [Linux, Mac, Windows]
    runs-on: ubuntu-22.04
    steps:
      - name: Check CI results
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "CI failed: found result '$r'"
              exit 1
            fi
          done
          echo "CI passed: $results"

  CreatePreRelease:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.event_name == 'push'"
    needs: [ci-gate]
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.KLOGG_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        shell: bash
        run: |
          # Find the last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found. Generating log from start."
            CHANGELOG=$(git log --pretty=format:"* %s (%h)")
          else
            echo "Generating changelog since $LAST_TAG"
            CHANGELOG=$(git log --pretty=format:"* %s (%h)" ${LAST_TAG}..HEAD)
          fi
          
          # Escape newlines for GITHUB_ENV
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "CHANGELOG<<$EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV
      
      - name: Download version artifact
        uses: actions/download-artifact@v4
        with:
          name: klogg_version
          path: klogg_version

      - name: Set version
        run: echo "KLOGG_VERSION=$(cat klogg_version/klogg_version.txt)" >> $GITHUB_ENV

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: ./packages-all

      - name: Clean up package artifacts
        shell: sh
        run: |
          # Remove macOS app bundles and internal files that shouldn't be uploaded to GitHub Release
          # These files are inside DMG packages and shouldn't be uploaded as separate assets
          find ./packages-all -type d -name "*.app" -exec rm -rf {} + 2>/dev/null || true
          find ./packages-all -type f \( -name "Info.plist" -o -name "libq*.dylib" -o -name "klogg.icns" -o -name "qt.conf" \) -delete 2>/dev/null || true
          # Remove Qt framework files that are inside app bundles (not package files)
          find ./packages-all -type f -name "Qt*" ! -name "*.dmg" ! -name "*.deb" ! -name "*.rpm" ! -name "*.AppImage" -delete 2>/dev/null || true
          # Remove standalone klogg binary (should be inside packages, not standalone)
          find ./packages-all -type f -name "klogg" ! -name "*.AppImage" ! -name "*.deb" ! -name "*.rpm" -delete 2>/dev/null || true
          # Keep only final package files: .dmg, .deb, .rpm, .AppImage, .exe, .zip, .xz, .tar.xz
          find ./packages-all -type f ! \( -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.exe" -o -name "*.zip" -o -name "*.xz" -o -name "*.tar.xz" \) -delete 2>/dev/null || true

      - name: Delete existing continuous release
        if: env.GITHUB_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.KLOGG_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          tag="continuous"

          release_id=""
          if release_id_value="$(gh api "/repos/${repo}/releases/tags/${tag}" --jq '.id' 2>/tmp/gh_release_lookup_err)"; then
            release_id="${release_id_value}"
          elif grep -q "404" /tmp/gh_release_lookup_err; then
            echo "No existing release for tag ${tag}"
          else
            cat /tmp/gh_release_lookup_err
            exit 1
          fi
          rm -f /tmp/gh_release_lookup_err

          if [ -n "${release_id}" ]; then
            echo "Deleting existing release id ${release_id} for tag ${tag}"
            gh api -X DELETE "/repos/${repo}/releases/${release_id}"
          fi

          # Delete the tag reference so the next release always points to this run's commit.
          # GitHub Delete a reference returns:
          # - 204: deleted
          # - 422: ref is already absent / unprocessable (safe to continue)
          # - 409: conflict (fail the job)
          tag_delete_headers="$(gh api -i --silent -X DELETE "/repos/${repo}/git/refs/tags/${tag}" 2>/tmp/gh_tag_delete_err || true)"
          tag_delete_status="$(printf '%s\n' "${tag_delete_headers}" | awk 'toupper($1) ~ /^HTTP/ { status=$2 } END { print status }')"

          case "${tag_delete_status}" in
            204)
              echo "Deleted tag reference ${tag}"
              ;;
            422)
              echo "Tag reference ${tag} is already absent or cannot be deleted (422); continuing"
              ;;
            409)
              echo "Conflict while deleting tag reference ${tag}"
              cat /tmp/gh_tag_delete_err
              exit 1
              ;;
            *)
              echo "Unexpected response while deleting tag reference ${tag}: status=${tag_delete_status:-unknown}"
              cat /tmp/gh_tag_delete_err
              exit 1
              ;;
          esac
          rm -f /tmp/gh_tag_delete_err

      - name: Create pre-release (continuous)
        id: create_release
        if: env.GITHUB_TOKEN != ''
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.KLOGG_GITHUB_TOKEN }}
          tag_name: continuous
          target_commitish: ${{ github.sha }}
          name: Continuous Build ${{ env.KLOGG_VERSION }}
          body: |
            Continuous build ${{ env.KLOGG_VERSION }}
            
            This is an automated pre-release build. For stable releases, see [releases](https://github.com/ZEACENT/klogg/releases).

            ## Changes
            ${{ env.CHANGELOG }}
          prerelease: true
          files: |
            ./packages-all/**/*
          draft: false

      - name: Enforce continuous release flags
        if: env.GITHUB_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.KLOGG_GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.create_release.outputs.id }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          release_id="${RELEASE_ID}"
          if [ -z "${release_id}" ]; then
            echo "::error::No release ID from create_release step"
            exit 1
          fi
          echo "Enforcing flags on release ${release_id}"
          gh api -X PATCH "/repos/${repo}/releases/${release_id}" \
            -f draft=false \
            -f prerelease=true >/dev/null

      - name: Verify continuous release flags
        if: env.GITHUB_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.KLOGG_GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.create_release.outputs.id }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          release_id="${RELEASE_ID}"
          if [ -z "${release_id}" ]; then
            echo "::error::No release ID from create_release step"
            exit 1
          fi
          draft="$(gh api "/repos/${repo}/releases/${release_id}" --jq '.draft')"
          prerelease="$(gh api "/repos/${repo}/releases/${release_id}" --jq '.prerelease')"

          echo "continuous release flags: draft=${draft} prerelease=${prerelease}"
          if [ "${draft}" != "false" ] || [ "${prerelease}" != "true" ]; then
            gh api "/repos/${repo}/releases/${release_id}" --jq '{id,tag_name,html_url,draft,prerelease,target_commitish}'
            exit 1
          fi
