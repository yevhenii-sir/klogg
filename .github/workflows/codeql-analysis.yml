name: "CodeQL"

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04

    # Expose values that agent-setup reads via matrix.config.*
    strategy:
      matrix:
        config:
          - os: linux
            arch: x64
            qt_version: 6.9.3
            qt_arch: linux_gcc_64
            qt_modules: qt5compat
            qt_archives: qtbase icu qtsvg qttools qttranslations

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: c-cpp

    - uses: ./.github/actions/agent-setup
    - name: Install Linux deps
      run: |
        sudo apt-get update
        sudo apt-get install -y libxkbcommon-dev libxkbcommon-x11-dev

    - name: Prepare compiler env
      run: |
        echo "CC=gcc-13" >> $GITHUB_ENV
        echo "CXX=g++-13" >> $GITHUB_ENV

    - name: configure
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DKLOGG_GENERIC_CPU=ON -DKLOGG_USE_SENTRY=OFF -DKLOGG_USE_VECTORSCAN=OFF ..

    - name: build
      run: |
        cmake --build build -t klogg

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
