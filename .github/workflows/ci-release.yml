name: "Make CI Release"

on:
  workflow_dispatch:
    inputs:
      ci-run-id:
        description: "Run ID of CI workflow"
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SENTRY_TOKEN: ${{ secrets.SENTRY_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.KLOGG_GITHUB_TOKEN }}
      DISCORD_NEW_VERSIONS_WEBHOOK: ${{ secrets.DISCORD_NEW_VERSIONS_WEBHOOK }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate Changelog
      id: changelog
      shell: bash
      run: |
        # Find the last tag
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        if [ -z "$LAST_TAG" ]; then
          echo "No previous tag found. Generating log from start."
          CHANGELOG=$(git log --pretty=format:"* %s (%h)")
        else
          echo "Generating changelog since $LAST_TAG"
          CHANGELOG=$(git log --pretty=format:"* %s (%h)" ${LAST_TAG}..HEAD)
        fi
        
        # Escape newlines for GITHUB_ENV
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "CHANGELOG<<$EOF" >> $GITHUB_ENV
        echo "$CHANGELOG" >> $GITHUB_ENV
        echo "$EOF" >> $GITHUB_ENV

    - name: Download artifacts for last successful CI workflow
      if: ${{ !github.event.inputs.ci-run-id }}
      uses: dawidd6/action-download-artifact@v2
      with:
        workflow: ci-build.yml
        workflow_conclusion: success
        check_artifacts: true

    - name: Download artifacts for CI workflow with provided run id
      if: ${{ github.event.inputs.ci-run-id }}
      uses: dawidd6/action-download-artifact@v2
      with:
        workflow: ci-build.yml
        run_id: ${{ github.event.inputs.ci-run-id }}

    - name: Initialize version
      run: echo "KLOGG_VERSION=`cat klogg_version/klogg_version.txt`" >> $GITHUB_ENV

    - name: Display structure of downloaded files
      run: ls -R ./packages-*

    - name: Decompress debug symbols
      shell: sh
      run: |
        if [ -f ./packages-jammy-vs-gen/klogg_jammy_vs-gen.debug.xz ]; then
          xz -d ./packages-jammy-vs-gen/klogg_jammy_vs-gen.debug.xz
        else
          echo "Warning: ./packages-jammy-vs-gen/klogg_jammy_vs-gen.debug.xz not found, skipping"
        fi
        if [ -f ./packages-noble-vs-gen/klogg_noble_vs-gen.debug.xz ]; then
          xz -d ./packages-noble-vs-gen/klogg_noble_vs-gen.debug.xz
        else
          echo "Warning: ./packages-noble-vs-gen/klogg_noble_vs-gen.debug.xz not found, skipping"
        fi
        if [ -f ./packages-appimage-vs-gen/klogg_appimage_vs-gen.debug.xz ]; then
          xz -d ./packages-appimage-vs-gen/klogg_appimage_vs-gen.debug.xz
        else
          echo "Warning: ./packages-appimage-vs-gen/klogg_appimage_vs-gen.debug.xz not found, skipping"
        fi

    - name: Setup Sentry CLI
      if: env.SENTRY_TOKEN != ''
      uses: mathrix-education/setup-sentry-cli@0.1.0
      env:
        ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'
      with:
        token: ${{ secrets.SENTRY_TOKEN }}
        organization: anton-filimonov
        project: klogg

    - name: Create Sentry release
      if: env.SENTRY_TOKEN != ''
      shell: sh
      run: |
        sentry-cli releases new $KLOGG_VERSION
        sentry-cli releases set-commits --auto $KLOGG_VERSION

    - name: Upload symbols linux
      if: env.SENTRY_TOKEN != ''
      shell: sh
      run: |
        if [ -f ./packages-jammy-vs-gen/klogg_jammy_vs-gen.debug ] && [ -f ./packages-jammy-vs-gen/klogg_jammy_vs-gen ]; then
          sentry-cli upload-dif ./packages-jammy-vs-gen/klogg_jammy_vs-gen.debug ./packages-jammy-vs-gen/klogg_jammy_vs-gen
        else
          echo "Warning: ./packages-jammy-vs-gen debug files not found, skipping"
        fi
        if [ -f ./packages-noble-vs-gen/klogg_noble_vs-gen.debug ] && [ -f ./packages-noble-vs-gen/klogg_noble_vs-gen ]; then
          sentry-cli upload-dif ./packages-noble-vs-gen/klogg_noble_vs-gen.debug  ./packages-noble-vs-gen/klogg_noble_vs-gen
        else
          echo "Warning: ./packages-noble-vs-gen debug files not found, skipping"
        fi
        if [ -f ./packages-appimage-vs-gen/klogg_appimage_vs-gen.debug ] && [ -f ./packages-appimage-vs-gen/klogg_appimage_vs-gen ]; then
          sentry-cli upload-dif ./packages-appimage-vs-gen/klogg_appimage_vs-gen.debug  ./packages-appimage-vs-gen/klogg_appimage_vs-gen
        else
          echo "Warning: ./packages-appimage-vs-gen debug files not found, skipping"
        fi

    - name: Upload symbols mac
      if: env.SENTRY_TOKEN != ''
      shell: sh
      run: |
        if [ -d ./packages-macos-intel-qt6-vs-gen ] && [ -f ./packages-macos-intel-qt6-vs-gen/klogg-x64.app/Contents/MacOS/klogg ]; then
          sentry-cli upload-dif ./packages-macos-intel-qt6-vs-gen/klogg-x64.app/Contents/MacOS/klogg ./packages-macos-intel-qt6-vs-gen/klogg-x64.dSym
        else
          echo "Skipping macOS Intel symbols upload - artifacts not found"
        fi
        if [ -d ./packages-macos-arm-qt6-vs-arm64 ] && [ -f ./packages-macos-arm-qt6-vs-arm64/klogg-arm64.app/Contents/MacOS/klogg ]; then
          sentry-cli upload-dif ./packages-macos-arm-qt6-vs-arm64/klogg-arm64.app/Contents/MacOS/klogg ./packages-macos-arm-qt6-vs-arm64/klogg-arm64.dSym
        else
          echo "Skipping macOS ARM symbols upload - artifacts not found"
        fi

    - name: Upload symbols win
      if: env.SENTRY_TOKEN != ''
      shell: sh
      run: |
        sentry-cli upload-dif ./packages-windows-x86-qt5-vs-gen/klogg-$KLOGG_VERSION-x86-Qt5-vs-gen-pdb.zip 
        sentry-cli upload-dif ./packages-windows-x64-qt6-vs-avx2/klogg-$KLOGG_VERSION-x64-Qt6-vs-avx2-pdb.zip

    - name: Cleanup release artifacts
      shell: sh
      run: |
        rm -rf ./packages-jammy-vs-gen/klogg_jammy_vs-gen
        rm -rf ./packages-noble-vs-gen/klogg_noble_vs-gen
        rm -rf ./packages-appimage-vs-gen/klogg_appimage_vs-gen
        if [ -d ./packages-macos-intel-qt6-vs-gen/klogg-x64.app ]; then
          rm -rf ./packages-macos-intel-qt6-vs-gen/klogg-x64.app
        fi
        if [ -d ./packages-macos-arm-qt6-vs-arm64/klogg-arm64.app ]; then
          rm -rf ./packages-macos-arm-qt6-vs-arm64/klogg-arm64.app
        fi
        mkdir -p ./linux-debug
        if [ -f ./packages-jammy-vs-gen/klogg_jammy_vs-gen.debug ]; then
          mv ./packages-jammy-vs-gen/klogg_jammy_vs-gen.debug ./linux-debug
        fi
        if [ -f ./packages-noble-vs-gen/klogg_noble_vs-gen.debug ]; then
          mv ./packages-noble-vs-gen/klogg_noble_vs-gen.debug ./linux-debug
        fi
        if [ -f ./packages-appimage-vs-gen/klogg_appimage_vs-gen.debug ]; then
          mv ./packages-appimage-vs-gen/klogg_appimage_vs-gen.debug ./linux-debug
        fi
        if [ -n "$(ls -A ./linux-debug/*.debug 2>/dev/null)" ]; then
          tar -cJf ./linux-debug/klogg-$KLOGG_VERSION-symbols.tar.xz ./linux-debug/*.debug
          rm ./linux-debug/*.debug
        else
          echo "Warning: No debug files found, skipping symbols archive creation"
        fi

    - name: Prepare binary artifacts
      shell: sh
      run: |
        mkdir ./packages-bin
        mv ./packages-appimage-vs-gen/klogg_deps.tar.xz ./packages-bin/klogg-$KLOGG_VERSION-vs-gen-deps.tar.xz
        mv ./klogg_version/klogg_version.txt ./packages-bin

    - name: Prepare checksums
      shell: sh
      run: |
        sha256sum --binary ./packages-bin/* > ./packages-bin/klogg-$KLOGG_VERSION-sha256.txt 2>/dev/null || true
        if [ -d ./packages-jammy-vs-gen ] && [ -n "$(ls -A ./packages-jammy-vs-gen/* 2>/dev/null)" ]; then
          sha256sum --binary ./packages-jammy-vs-gen/* >> ./packages-bin/klogg-$KLOGG_VERSION-sha256.txt 2>/dev/null || true
        fi
        if [ -d ./packages-noble-vs-gen ] && [ -n "$(ls -A ./packages-noble-vs-gen/* 2>/dev/null)" ]; then
          sha256sum --binary ./packages-noble-vs-gen/* >> ./packages-bin/klogg-$KLOGG_VERSION-sha256.txt 2>/dev/null || true
        fi
        if [ -d ./packages-appimage-vs-gen ] && [ -n "$(ls -A ./packages-appimage-vs-gen/* 2>/dev/null)" ]; then
          sha256sum --binary ./packages-appimage-vs-gen/* >> ./packages-bin/klogg-$KLOGG_VERSION-sha256.txt 2>/dev/null || true
        fi
        
    - name: Create GitHub Release
      if: env.GITHUB_TOKEN != ''
      uses: softprops/action-gh-release@v1
      with:
        token: ${{ secrets.KLOGG_GITHUB_TOKEN }}
        tag_name: v${{ env.KLOGG_VERSION }}
        name: Release v${{ env.KLOGG_VERSION }}
        body: |
          Release v${{ env.KLOGG_VERSION }}
          
          ## Changes
          ${{ env.CHANGELOG }}
          
          ## Downloads
          - **Windows**: See [Windows packages](#windows)
          - **Linux**: See [Linux packages](#linux)
          - **macOS**: See [macOS packages](#macos)
          
          ## Windows {#windows}
          - Windows x64 (Qt 6, Vectorscan AVX2): `klogg-${{ env.KLOGG_VERSION }}-x64-Qt6-vs-avx2-setup.exe`
          - Windows x86 (Qt 5, Vectorscan generic): `klogg-${{ env.KLOGG_VERSION }}-x86-Qt5-vs-gen-setup.exe`
          
          ## Linux {#linux}
          - Ubuntu 22.04 (Jammy, Vectorscan generic): `klogg-${{ env.KLOGG_VERSION }}-jammy-vs-gen.deb`
          - Ubuntu 24.04 (Noble, Vectorscan generic): `klogg-${{ env.KLOGG_VERSION }}-noble-vs-gen.deb`
          - AppImage (Vectorscan generic): `klogg-${{ env.KLOGG_VERSION }}-appimage-vs-gen.AppImage`
          
          ## macOS {#macos}
          - Intel (x64, Vectorscan generic): `klogg-${{ env.KLOGG_VERSION }}-mac-x64-vs-gen.dmg`
          - Apple Silicon (ARM64, Vectorscan): `klogg-${{ env.KLOGG_VERSION }}-mac-arm64-vs-arm64.dmg`
        prerelease: false
        files: |
          ./packages-windows-x86-qt5-vs-gen/*
          ./packages-windows-x64-qt6-vs-avx2/*
          ./packages-jammy-vs-gen/*
          ./packages-noble-vs-gen/*
          ./packages-appimage-vs-gen/*
          ./packages-bin/*
          ./linux-debug/*
          ./packages-macos-intel-qt6-vs-gen/*.dmg
          ./packages-macos-arm-qt6-vs-arm64/*.dmg

    - name: Discord notification
      if: env.DISCORD_NEW_VERSIONS_WEBHOOK != ''
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_NEW_VERSIONS_WEBHOOK }}
        DISCORD_EMBEDS: '[{"title": "Release v${{ env.KLOGG_VERSION }}", "url": "https://github.com/ZEACENT/klogg/releases/tag/v${{ env.KLOGG_VERSION }}"}]'
      uses: Ilshidur/action-discord@master
      with:
        args: 'New release v${{ env.KLOGG_VERSION }} has been published!'




   
