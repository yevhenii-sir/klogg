name: "Make CI Release"

on:
  workflow_dispatch:
    inputs:
      ci-run-id:
        description: "Run ID of CI workflow"
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SENTRY_TOKEN: ${{ secrets.SENTRY_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.KLOGG_GITHUB_TOKEN }}
      DISCORD_NEW_VERSIONS_WEBHOOK: ${{ secrets.DISCORD_NEW_VERSIONS_WEBHOOK }}
    steps:
    - uses: actions/checkout@v4
    - name: Download artifacts for last successful CI workflow
      if: ${{ !github.event.inputs.ci-run-id }}
      uses: dawidd6/action-download-artifact@v2
      with:
        workflow: ci-build.yml
        workflow_conclusion: success
        check_artifacts: true

    - name: Download artifacts for CI workflow with provided run id
      if: ${{ github.event.inputs.ci-run-id }}
      uses: dawidd6/action-download-artifact@v2
      with:
        workflow: ci-build.yml
        run_id: ${{ github.event.inputs.ci-run-id }}

    - name: Initialize version
      run: echo "KLOGG_VERSION=`cat klogg_version/klogg_version.txt`" >> $GITHUB_ENV

    - name: Display structure of downloaded files
      run: ls -R ./packages-*

    - name: Decompress debug symbols
      shell: sh
      run: |
        if [ -f ./packages-focal/klogg_focal.debug.xz ]; then
          xz -d ./packages-focal/klogg_focal.debug.xz
        else
          echo "Warning: ./packages-focal/klogg_focal.debug.xz not found, skipping"
        fi
        if [ -f ./packages-jammy/klogg_jammy.debug.xz ]; then
          xz -d ./packages-jammy/klogg_jammy.debug.xz
        else
          echo "Warning: ./packages-jammy/klogg_jammy.debug.xz not found, skipping"
        fi
        if [ -f ./packages-noble/klogg_noble.debug.xz ]; then
          xz -d ./packages-noble/klogg_noble.debug.xz
        else
          echo "Warning: ./packages-noble/klogg_noble.debug.xz not found, skipping"
        fi
        if [ -f ./packages-oracle/klogg_oracle.debug.xz ]; then
          xz -d ./packages-oracle/klogg_oracle.debug.xz
        else
          echo "Warning: ./packages-oracle/klogg_oracle.debug.xz not found, skipping"
        fi
        if [ -f ./packages-appimage/klogg_appimage.debug.xz ]; then
          xz -d ./packages-appimage/klogg_appimage.debug.xz
        else
          echo "Warning: ./packages-appimage/klogg_appimage.debug.xz not found, skipping"
        fi

    - name: Setup Sentry CLI
      if: env.SENTRY_TOKEN != ''
      uses: mathrix-education/setup-sentry-cli@0.1.0
      env:
        ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'
      with:
        token: ${{ secrets.SENTRY_TOKEN }}
        organization: anton-filimonov
        project: klogg

    - name: Create Sentry release
      if: env.SENTRY_TOKEN != ''
      shell: sh
      run: |
        sentry-cli releases new $KLOGG_VERSION
        sentry-cli releases set-commits --auto $KLOGG_VERSION

    - name: Upload symbols linux
      if: env.SENTRY_TOKEN != ''
      shell: sh
      run: |
        if [ -f ./packages-focal/klogg_focal.debug ] && [ -f ./packages-focal/klogg_focal ]; then
          sentry-cli upload-dif ./packages-focal/klogg_focal.debug ./packages-focal/klogg_focal
        else
          echo "Warning: ./packages-focal debug files not found, skipping"
        fi
        if [ -f ./packages-jammy/klogg_jammy.debug ] && [ -f ./packages-jammy/klogg_jammy ]; then
          sentry-cli upload-dif ./packages-jammy/klogg_jammy.debug ./packages-jammy/klogg_jammy
        else
          echo "Warning: ./packages-jammy debug files not found, skipping"
        fi
        if [ -f ./packages-noble/klogg_noble.debug ] && [ -f ./packages-noble/klogg_noble ]; then
          sentry-cli upload-dif ./packages-noble/klogg_noble.debug  ./packages-noble/klogg_noble
        else
          echo "Warning: ./packages-noble debug files not found, skipping"
        fi
        if [ -f ./packages-oracle/klogg_oracle.debug ] && [ -f ./packages-oracle/klogg_oracle ]; then
          sentry-cli upload-dif ./packages-oracle/klogg_oracle.debug ./packages-oracle/klogg_oracle
        else
          echo "Warning: ./packages-oracle debug files not found, skipping"
        fi
        if [ -f ./packages-appimage/klogg_appimage.debug ] && [ -f ./packages-appimage/klogg_appimage ]; then
          sentry-cli upload-dif ./packages-appimage/klogg_appimage.debug  ./packages-appimage/klogg_appimage
        else
          echo "Warning: ./packages-appimage debug files not found, skipping"
        fi

    - name: Upload symbols mac
      if: env.SENTRY_TOKEN != ''
      shell: sh
      run: |
        if [ -d ./packages-macos-intel-qt6 ] && [ -f ./packages-macos-intel-qt6/klogg-x64.app/Contents/MacOS/klogg ]; then
          sentry-cli upload-dif ./packages-macos-intel-qt6/klogg-x64.app/Contents/MacOS/klogg ./packages-macos-intel-qt6/klogg-x64.dSym
        else
          echo "Skipping macOS Intel symbols upload - artifacts not found"
        fi
        if [ -d ./packages-macos-arm-qt6 ] && [ -f ./packages-macos-arm-qt6/klogg-arm64.app/Contents/MacOS/klogg ]; then
          sentry-cli upload-dif ./packages-macos-arm-qt6/klogg-arm64.app/Contents/MacOS/klogg ./packages-macos-arm-qt6/klogg-arm64.dSym
        else
          echo "Skipping macOS ARM symbols upload - artifacts not found"
        fi

    - name: Upload symbols win
      if: env.SENTRY_TOKEN != ''
      shell: sh
      run: |
        sentry-cli upload-dif ./packages-windows-x86-qt5/klogg-$KLOGG_VERSION-x86-Qt5-pdb.zip 
        sentry-cli upload-dif ./packages-windows-x64-qt6/klogg-$KLOGG_VERSION-x64-Qt6-pdb.zip

    - name: Cleanup release artifacts
      shell: sh
      run: |
        rm -rf ./packages-focal/klogg_focal
        rm -rf ./packages-jammy/klogg_jammy
        rm -rf ./packages-noble/klogg_noble
        rm -rf ./packages-oracle/klogg_oracle
        rm -rf ./packages-appimage/klogg_appimage
        if [ -d ./packages-macos-intel-qt6/klogg-x64.app ]; then
          rm -rf ./packages-macos-intel-qt6/klogg-x64.app
        fi
        if [ -d ./packages-macos-arm-qt6/klogg-arm64.app ]; then
          rm -rf ./packages-macos-arm-qt6/klogg-arm64.app
        fi
        mkdir -p ./linux-debug
        if [ -f ./packages-focal/klogg_focal.debug ]; then
          mv ./packages-focal/klogg_focal.debug ./linux-debug
        fi
        if [ -f ./packages-jammy/klogg_jammy.debug ]; then
          mv ./packages-jammy/klogg_jammy.debug ./linux-debug
        fi
        if [ -f ./packages-noble/klogg_noble.debug ]; then
          mv ./packages-noble/klogg_noble.debug ./linux-debug
        fi
        if [ -f ./packages-oracle/klogg_oracle.debug ]; then
          mv ./packages-oracle/klogg_oracle.debug ./linux-debug
        fi
        if [ -f ./packages-appimage/klogg_appimage.debug ]; then
          mv ./packages-appimage/klogg_appimage.debug ./linux-debug
        fi
        if [ -n "$(ls -A ./linux-debug/*.debug 2>/dev/null)" ]; then
          tar -cJf ./linux-debug/klogg-$KLOGG_VERSION-symbols.tar.xz ./linux-debug/*.debug
          rm ./linux-debug/*.debug
        else
          echo "Warning: No debug files found, skipping symbols archive creation"
        fi

    - name: Prepare binary artifacts
      shell: sh
      run: |
        mkdir ./packages-bin
        mv ./packages-appimage/klogg_deps.tar.xz ./packages-bin/klogg-$KLOGG_VERSION-deps.tar.xz
        ar p  ./packages-focal/klogg-$KLOGG_VERSION-focal.deb data.tar.gz > ./packages-bin/klogg-$KLOGG_VERSION-bin.tar.gz
        mv ./klogg_version/klogg_version.txt ./packages-bin

    - name: Prepare checksums
      shell: sh
      run: |
        sha256sum --binary ./packages-bin/* > ./packages-bin/klogg-$KLOGG_VERSION-sha256.txt 2>/dev/null || true
        if [ -d ./packages-focal ] && [ -n "$(ls -A ./packages-focal/* 2>/dev/null)" ]; then
          sha256sum --binary ./packages-focal/* >> ./packages-bin/klogg-$KLOGG_VERSION-sha256.txt 2>/dev/null || true
        fi
        if [ -d ./packages-jammy ] && [ -n "$(ls -A ./packages-jammy/* 2>/dev/null)" ]; then
          sha256sum --binary ./packages-jammy/* >> ./packages-bin/klogg-$KLOGG_VERSION-sha256.txt 2>/dev/null || true
        fi
        if [ -d ./packages-noble ] && [ -n "$(ls -A ./packages-noble/* 2>/dev/null)" ]; then
          sha256sum --binary ./packages-noble/* >> ./packages-bin/klogg-$KLOGG_VERSION-sha256.txt 2>/dev/null || true
        fi
        if [ -d ./packages-oracle ] && [ -n "$(ls -A ./packages-oracle/* 2>/dev/null)" ]; then
          sha256sum --binary ./packages-oracle/* >> ./packages-bin/klogg-$KLOGG_VERSION-sha256.txt 2>/dev/null || true
        fi
        if [ -d ./packages-appimage ] && [ -n "$(ls -A ./packages-appimage/* 2>/dev/null)" ]; then
          sha256sum --binary ./packages-appimage/* >> ./packages-bin/klogg-$KLOGG_VERSION-sha256.txt 2>/dev/null || true
        fi
        
    - name: Create GitHub Release
      if: env.GITHUB_TOKEN != ''
      uses: softprops/action-gh-release@v1
      with:
        token: ${{ secrets.KLOGG_GITHUB_TOKEN }}
        tag_name: v${{ env.KLOGG_VERSION }}
        name: Release v${{ env.KLOGG_VERSION }}
        body: |
          Release v${{ env.KLOGG_VERSION }}
          
          ## Downloads
          - **Windows**: See [Windows packages](#windows)
          - **Linux**: See [Linux packages](#linux)
          - **macOS**: See [macOS packages](#macos)
          
          ## Windows {#windows}
          - Windows x64 (Qt 6): `klogg-${{ env.KLOGG_VERSION }}-x64-Qt6.exe`
          - Windows x86 (Qt 5): `klogg-${{ env.KLOGG_VERSION }}-x86-Qt5.exe`
          
          ## Linux {#linux}
          - Ubuntu 20.04 (Focal): `klogg-${{ env.KLOGG_VERSION }}-focal.deb`
          - Ubuntu 22.04 (Jammy): `klogg-${{ env.KLOGG_VERSION }}-jammy.deb`
          - Ubuntu 24.04 (Noble): `klogg-${{ env.KLOGG_VERSION }}-noble.deb`
          - Oracle Linux 8: `klogg-${{ env.KLOGG_VERSION }}-oracle.rpm`
          - AppImage: `klogg-${{ env.KLOGG_VERSION }}-appimage.AppImage`
          
          ## macOS {#macos}
          - Intel (x64): `klogg-${{ env.KLOGG_VERSION }}-mac-x64.dmg`
          - Apple Silicon (ARM64): `klogg-${{ env.KLOGG_VERSION }}-mac-arm64.dmg`
        prerelease: false
        files: |
          ./packages-windows-x86-qt5/*
          ./packages-windows-x64-qt6/*
          ./packages-focal/*
          ./packages-jammy/*
          ./packages-noble/*
          ./packages-oracle/*
          ./packages-appimage/*
          ./packages-bin/*
          ./linux-debug/*
          ./packages-macos-intel-qt6/*.dmg
          ./packages-macos-arm-qt6/*.dmg

    - name: Discord notification
      if: env.DISCORD_NEW_VERSIONS_WEBHOOK != ''
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_NEW_VERSIONS_WEBHOOK }}
        DISCORD_EMBEDS: '[{"title": "Release v${{ env.KLOGG_VERSION }}", "url": "https://github.com/ZEACENT/klogg/releases/tag/v${{ env.KLOGG_VERSION }}"}]'
      uses: Ilshidur/action-discord@master
      with:
        args: 'New release v${{ env.KLOGG_VERSION }} has been published!'




   
