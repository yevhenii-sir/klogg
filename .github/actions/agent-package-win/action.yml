name: "Prepare windows packages"
description: ""
inputs:
  s3-key-id:
    required: true
  s3-secret:
    required: true
  s3-bucket:
    required: true
runs:
  using: "composite"
  steps:
    - name: Win portable
      shell: cmd
      run: |
        packaging\windows\prepare_release.cmd

    - name: Win installer
      uses: joncloud/makensis-action@v3.3
      with:
        script-file: klogg.nsi
        arguments: "-DVERSION=%KLOGG_VERSION% -DPLATFORM=%KLOGG_ARCH% -DQT_MAJOR=%KLOGG_QT%" 
    
    - name: Win package
      shell: cmd
      run: |
        if not exist "%KLOGG_BUILD_ROOT%\packages" md "%KLOGG_BUILD_ROOT%\packages"
        copy /y "klogg-%KLOGG_VERSION%-%KLOGG_ARCH%-%KLOGG_QT%-portable.zip" "%KLOGG_BUILD_ROOT%\packages\klogg-%KLOGG_VERSION%-%KLOGG_ARCH%-%KLOGG_QT%-%KLOGG_PACKAGE_TAG%-portable.zip"
        copy /y "klogg-%KLOGG_VERSION%-%KLOGG_ARCH%-%KLOGG_QT%-pdb.zip" "%KLOGG_BUILD_ROOT%\packages\klogg-%KLOGG_VERSION%-%KLOGG_ARCH%-%KLOGG_QT%-%KLOGG_PACKAGE_TAG%-pdb.zip"
        copy /y "klogg-%KLOGG_VERSION%-%KLOGG_ARCH%-%KLOGG_QT%-setup.exe" "%KLOGG_BUILD_ROOT%\packages\klogg-%KLOGG_VERSION%-%KLOGG_ARCH%-%KLOGG_QT%-%KLOGG_PACKAGE_TAG%-setup.exe"
      
