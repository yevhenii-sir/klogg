name: "Prepare klogg mac packages"
description: ""
inputs:
  p12-file-base64:
    required: false
  p12-password:
    required: false
  notarization-username:
    required: false
  notarization-team:
    required: false
  notarization-password:
    required: false
    
runs:
  using: "composite"
  steps:
    - name: Mac prepare codesign
      id: prepare-codesign
      if: ${{ github.event_name != 'pull_request' && inputs.p12-file-base64 != '' }}
      uses: apple-actions/import-codesign-certs@v1
      with: 
        p12-file-base64: ${{ inputs.p12-file-base64 }}
        p12-password: ${{ inputs.p12-password }}
     
    - name: Mac deploy Qt
      shell: sh
      run: |
        cd $KLOGG_BUILD_ROOT
        macdeployqt ./output/klogg.app -always-overwrite -verbose=2

    - name: Mac deploy Qt fixing
      if: "startsWith(matrix.config.qt_version, '5')"
      shell: sh
      run: |
        # macdeployqtfix.py may try to delete rpaths that don't exist (already removed by macdeployqt)
        # This is harmless, so we ignore the error if it occurs
        python3 $KLOGG_BUILD_ROOT/macdeployqtfix.py $KLOGG_BUILD_ROOT/output/klogg.app/Contents/MacOS/klogg $Qt5_DIR || echo "Warning: macdeployqtfix.py completed with errors (may be harmless)"

    - name: Mac deploy Qt fixing
      if: "startsWith(matrix.config.qt_version, '6')"
      shell: sh
      run: |
        # macdeployqtfix.py may try to delete rpaths that don't exist (already removed by macdeployqt)
        # This is harmless, so we ignore the error if it occurs
        python3 $KLOGG_BUILD_ROOT/macdeployqtfix.py $KLOGG_BUILD_ROOT/output/klogg.app/Contents/MacOS/klogg $Qt6_DIR || echo "Warning: macdeployqtfix.py completed with errors (may be harmless)"
    
    - name: Set packaging env
      shell: sh
      run: |
        echo "KLOGG_CODESIGN=Developer ID Application: Anton Filimonov (GAW773U324)" >> $GITHUB_ENV
        echo "KLOGG_INSTALLERSIGN=Developer ID Installer: Anton Filimonov (GAW773U324)" >> $GITHUB_ENV
        echo "KLOGG_DMG=klogg-${{ env.KLOGG_VERSION }}-mac-${{ env.KLOGG_ARCH }}-${{ env.KLOGG_PACKAGE_TAG }}.dmg" >> $GITHUB_ENV
        echo "KLOGG_PKG=klogg-${{ env.KLOGG_VERSION }}-mac-${{ env.KLOGG_ARCH }}-${{ env.KLOGG_PACKAGE_TAG }}.pkg" >> $GITHUB_ENV

    - name: Mac codesign binaries
      if: ${{ github.event_name != 'pull_request' && inputs.p12-file-base64 != '' }}
      shell: sh
      run: |
        cd $KLOGG_BUILD_ROOT
        codesign -v -f -o runtime --deep --timestamp -s "${{ env.KLOGG_CODESIGN }}" ./output/klogg.app;
    
    - name: Mac pack dmg
      shell: sh
      run: |
        cd $KLOGG_BUILD_ROOT
        # Clean up any leftover mounted volumes from previous runs
        if [ -d "/Volumes/klogg" ]; then
            hdiutil detach "/Volumes/klogg" -force 2>/dev/null || true
        fi
        rm -f ./packages/*.dmg 2>/dev/null || true
        mkdir -p ./packages

        # Build DMG directly with hdiutil instead of CPack DragNDrop.
        #
        # CPack's DragNDrop generator runs a CMake install step that calls
        # install_name_tool -delete_rpath on the staged binary.  When
        # macdeployqt has already removed that rpath, the delete fails and
        # cascades into hdiutil detach errors.  This has been an intermittent
        # CI failure that was patched and reverted repeatedly:
        #   b6f71e12 → 44d58b34 → f468d7da → 92791b80 → 4d367052
        #
        # Using hdiutil directly on the macdeployqt-processed .app bundle
        # bypasses CMake's install/rpath logic entirely — zero rpath
        # operations, zero conflicts.

        DMG_STAGING=$(mktemp -d)
        cp -a ./output/klogg.app "${DMG_STAGING}/"
        ln -s /Applications "${DMG_STAGING}/Applications"

        # Copy background image for the DMG window
        BACKGROUND_DIR="${DMG_STAGING}/.background"
        mkdir -p "${BACKGROUND_DIR}"
        cp "${KLOGG_WORKSPACE}/packaging/osx/dmg_background.tif" "${BACKGROUND_DIR}/background.tif"

        hdiutil create \
            -volname "klogg" \
            -srcfolder "${DMG_STAGING}" \
            -ov \
            -format UDZO \
            "./packages/klogg-${{ env.KLOGG_VERSION }}-OSX.dmg"

        rm -rf "${DMG_STAGING}"

        if [ ! -f "./packages/klogg-${{ env.KLOGG_VERSION }}-OSX.dmg" ]; then
            echo "DMG creation failed"
            exit 1
        fi
        echo "DMG created successfully: ./packages/klogg-${{ env.KLOGG_VERSION }}-OSX.dmg"

    - name: Mac rename dmg with arch
      shell: sh
      run: |
        cd $KLOGG_BUILD_ROOT
        # Rename DMG to include architecture to avoid conflicts when multiple macOS builds upload
        mv ./packages/klogg-${{ env.KLOGG_VERSION }}-OSX.dmg ./packages/${{ env.KLOGG_DMG }}
        echo "Renamed DMG to: ${{ env.KLOGG_DMG }}"

    - name: Mac codesign dmg
      if: ${{ github.event_name != 'pull_request' && inputs.p12-file-base64 != '' }}
      shell: sh
      run: |
        cd $KLOGG_BUILD_ROOT
        codesign -v -f -o runtime --timestamp -s "${{ env.KLOGG_CODESIGN }}" ./packages/${{ env.KLOGG_DMG }}
    
    - name: Mac notarize DMG 
      if: ${{ github.event_name != 'pull_request' && inputs.notarization-username != '' }}
      shell: sh
      run: |
        xcrun notarytool submit --wait --apple-id "${{ inputs.notarization-username }}" --team-id "${{ inputs.notarization-team }}" --password "${{ inputs.notarization-password }}" "${{ env.KLOGG_BUILD_ROOT }}/packages/${{ env.KLOGG_DMG }}" | tee dmg_notary.log
        dmg_notary_id=$(awk '$1=="id:"{id=$2} END{print id}' dmg_notary.log)
        xcrun notarytool log --apple-id "${{ inputs.notarization-username }}" --team-id "${{ inputs.notarization-team }}" --password "${{ inputs.notarization-password }}" "$dmg_notary_id" "dmg_notary.log.json"
        cat "dmg_notary.log.json"

    - name: Mac staple DMG 
      if: ${{ github.event_name != 'pull_request' && inputs.notarization-username != '' }}
      shell: sh
      run: |
        xcrun stapler staple "${{ env.KLOGG_BUILD_ROOT }}/packages/${{ env.KLOGG_DMG }}"

    #- name: "Mac build pkg"
    #  if: ${{ github.event_name != 'pull_request' }}
    #  shell: sh
    #  run: |
    #    cd $KLOGG_BUILD_ROOT
    #    mkdir -p packages
    #    mkdir -p pkg_resources/en.lproj
    #    cp ../COPYING pkg_resources/en.lproj
    #    cp ../packaging/description.txt pkg_resources/en.lproj
    #    sed -e s/%klogg_version%/${{ env.KLOGG_VERSION }}/ -e s/%klogg_pkg%/klogg-${{ env.KLOGG_VERSION }}-OSX.pkg/ ../packaging/osx/distribution.xml > distribution.xml
    #    pkgbuild --component ./output/klogg.app --install-location /Applications --version ${{ env.KLOGG_VERSION }} --sign "${{ env.KLOGG_INSTALLERSIGN }}" --timestamp ./output/klogg-${{ env.KLOGG_VERSION }}-OSX.pkg
    #    productbuild --package-path ./output --distribution distribution.xml --resources ./pkg_resources --sign "${{ env.KLOGG_INSTALLERSIGN }}" --timestamp ./output/klogg-${{ env.KLOGG_VERSION }}-OSX-product.pkg
    #    pkgutil --expand ./output/klogg-${{ env.KLOGG_VERSION }}-OSX-product.pkg ./output/klogg_product_pkg
    #    pkgutil --flatten ./output/klogg_product_pkg ./output/klogg-${{ env.KLOGG_VERSION }}-OSX-flatten.pkg
    #    productsign --sign "${{ env.KLOGG_INSTALLERSIGN }}" --timestamp ./output/klogg-${{ env.KLOGG_VERSION }}-OSX-flatten.pkg ./packages/${{ env.KLOGG_PKG }}

    #- name: Mac notarize PKG 
    #  if: ${{ github.event_name != 'pull_request' }} 
    #  shell: sh
    #  run: |
    #    xcrun notarytool submit  --wait --apple-id "${{ inputs.notarization-username }}" --team-id "${{ inputs.notarization-team }}" --password "${{ inputs.notarization-password }}" "${{ env.KLOGG_BUILD_ROOT }}/packages/${{ env.KLOGG_PKG }}" | tee pkg_notary.log
    #    pkg_notary_id=$(awk '$1=="id:"{id=$2} END{print id}' pkg_notary.log)
    #    xcrun notarytool log --apple-id "${{ inputs.notarization-username }}" --team-id "${{ inputs.notarization-team }}" --password "${{ inputs.notarization-password }}" "$pkg_notary_id" "pkg_notary.log.json"
    #    cat "pkg_notary.log.json"

    #- name: Mac staple PKG 
    #  if: ${{ github.event_name != 'pull_request' }} 
    #  shell: sh 
    #  run: |
    #    xcrun stapler staple "${{ env.KLOGG_BUILD_ROOT }}/packages/${{ env.KLOGG_PKG }}"

    - name: Mac symbols
      shell: sh
      run: |
        cd $KLOGG_BUILD_ROOT
        if [ -d ./output/klogg.dSym ]; then
          cp -a ./output/klogg.dSym ./packages/klogg-${{ env.KLOGG_ARCH }}.dSym
        else
          echo "Warning: klogg.dSym not found - skipping dSYM copy"
        fi
        if [ -d ./output/klogg.app ]; then
          cp -a ./output/klogg.app ./packages/klogg-${{ env.KLOGG_ARCH }}.app
        else
          echo "Warning: klogg.app not found - skipping app copy"
        fi
