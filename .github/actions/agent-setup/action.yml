name: "Setup agent"
description: ""
runs:
  using: "composite"
  steps:
    - name: Install Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Install Qt
      if: ${{ matrix.config.qt_arch }}
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.config.qt_version }}
        arch: ${{ matrix.config.qt_arch }}
        cache: true
        modules: ${{ matrix.config.qt_modules }}
        archives: ${{ matrix.config.qt_archives || 'qtbase icu' }}

    - name: Set boost env vars
      shell: sh
      run: |
        echo "BOOST_ROOT=${{github.workspace}}/3rdparty/boost" >> $GITHUB_ENV
        echo "BOOST_URL=https://sourceforge.net/projects/boost/files/boost/1.86.0/boost_1_86_0.tar.bz2/download" >> $GITHUB_ENV

    - name: Restore Boost cache
      if: ${{ env.KLOGG_REQUIRE_PREFETCHED_BOOST != 'ON' }}
      uses: actions/cache@v4
      id: cache-boost
      with:
        path: ${{env.BOOST_ROOT}}
        key: ${{env.BOOST_URL}}

    - name: Restore CPM cache
      if: ${{ env.KLOGG_REQUIRE_PREFETCHED_CPM != 'ON' }}
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/cpm_cache
        key: CPM-${{ hashFiles('3rdparty/CMakeLists.txt', 'cmake/CPM.cmake', '3rdparty/patches/**', 'cmake/prefetch_cpm/CMakeLists.txt') }}

    - name: Install Boost
      shell: bash
      run: |
        if [ -f "$BOOST_ROOT/boost/version.hpp" ]
        then
          echo "Using boost from preloaded path"
        elif [ "${KLOGG_REQUIRE_PREFETCHED_BOOST:-OFF}" = "ON" ]
        then
          echo "Prefetched Boost artifact is required but not available at $BOOST_ROOT" >&2
          exit 1
        else
          echo "Downloading boost"
          if [ "$OS" == "Windows_NT" ]; then
            # fix up paths to be forward slashes consistently
            BOOST_ROOT=$(echo $BOOST_ROOT | sed 's/\\/\//g')
          fi
          mkdir -p $BOOST_ROOT
          curl --progress-bar --location --output $BOOST_ROOT/download.tar.bz2 $BOOST_URL
          7z -o$BOOST_ROOT x $BOOST_ROOT/download.tar.bz2 -y -bd
          7z -o$BOOST_ROOT x $BOOST_ROOT/download.tar -y -bd
          cd $BOOST_ROOT && cp -r boost_*/* .
          rm -rf boost_*/* download.tar.bz2 download.tar
        fi
        
