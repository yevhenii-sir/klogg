name: "Prefetch CPM cache"
description: "Populate the shared CPM source cache with configure retries"
runs:
  using: "composite"
  steps:
    - name: Prefetch CPM source cache
      shell: sh
      run: |
        PREFETCH_BUILD_ROOT="$KLOGG_WORKSPACE/build_root_prefetch"
        attempt=1
        max_attempts=3
        while [ $attempt -le $max_attempts ]; do
          rm -rf "$PREFETCH_BUILD_ROOT"

          if cmake -S "$KLOGG_WORKSPACE/cmake/prefetch_cpm" -B "$PREFETCH_BUILD_ROOT" -DCPM_SOURCE_CACHE="$KLOGG_WORKSPACE/cpm_cache" -DCMAKE_POLICY_VERSION_MINIMUM=3.5; then
            exit 0
          fi

          if [ $attempt -eq $max_attempts ]; then
            exit 1
          fi

          echo "CPM prefetch attempt $attempt failed, retrying after backoff..."
          attempt=$((attempt + 1))
          sleep $((attempt * 10))
        done
