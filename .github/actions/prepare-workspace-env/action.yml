name: "Set common env vars"
description: ""
runs:
  using: "composite"
  steps:
    - name: Set common env vars
      shell: sh
      run: |
        echo "KLOGG_WORKSPACE=${{ github.workspace }}" >> $GITHUB_ENV 
        echo "KLOGG_BUILD_ROOT=build_root" >> $GITHUB_ENV 
        echo "KLOGG_ARCH=${{ matrix.config.arch }}" >> $GITHUB_ENV 
        echo "KLOGG_PACKAGE_TAG=${{ matrix.config.package_tag }}" >> $GITHUB_ENV
        echo "KLOGG_CMAKE_OPTS=-G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DKLOGG_GENERIC_CPU=ON -DKLOGG_USE_SENTRY=ON -DWARNINGS_AS_ERRORS=ON -DCMAKE_INSTALL_PREFIX=/usr ${{ matrix.config.cmake_opts }}" >> $GITHUB_ENV

    - name: Set qt env var
      if: "startsWith(matrix.config.qt_version, '5')"
      shell: sh
      run: |
        echo "KLOGG_QT=Qt5" >> $GITHUB_ENV
        # install-qt-action sets QT_ROOT_DIR to the Qt root (where bin/
        # and plugins/ live), which is exactly what KLOGG_QT_DIR needs.
        echo "KLOGG_QT_DIR=${{ env.QT_ROOT_DIR }}" >> $GITHUB_ENV

    - name: Set qt env var
      if: "startsWith(matrix.config.qt_version, '6')"
      shell: sh
      run: |
        echo "KLOGG_QT=Qt6" >> $GITHUB_ENV
        echo "KLOGG_QT_DIR=${{ env.QT_ROOT_DIR }}" >> $GITHUB_ENV
